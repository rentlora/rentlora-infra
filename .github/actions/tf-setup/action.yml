name: "Terraform Setup"
description: "Sets up Terraform, configures AWS OIDC auth, and initializes the given stack. Assumes the repo is already checked out by the caller."

inputs:
  stack:
    description: "The stack directory (e.g., dev, prod, cluster)"
    required: true
  aws-role-arn:
    description: "The IAM Role ARN to assume via OIDC"
    required: true
  terraform-version:
    description: "Terraform version to install"
    required: false
    default: "1.8.0"
  aws-region:
    description: "AWS region"
    required: false
    default: "us-east-1"

runs:
  using: "composite"
  steps:
    # NOTE: no checkout here — the caller must check out first (a local action
    # reference like ./.github/actions/tf-setup requires the repo on disk already).
    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}

    - name: AWS auth (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        aws-region: ${{ inputs.aws-region }}

    - name: terraform init
      run: terraform init
      working-directory: stacks/${{ inputs.stack }}
      shell: bash
