name: Terraform PR

# ── How AWS auth works ────────────────────────────────────────────────────────
# GitHub Actions uses OIDC (no static credentials stored anywhere):
#   1. Each job requests a short-lived OIDC token from GitHub.
#   2. aws-actions/configure-aws-credentials exchanges it with AWS STS for
#      temporary credentials, assuming the role in AWS_CI_ROLE_ARN.
#   3. The IAM role trust policy allows token.actions.githubusercontent.com
#      with sub: repo:rentlora/*:* — scoped to this org only.
#   Permissions required in the job: id-token: write
# ─────────────────────────────────────────────────────────────────────────────
#
# This workflow runs ONLY on pull requests. It validates, scans, and plans every
# stack so the reviewer sees the full diff before merge. It never touches AWS state
# (plan is read-only). Apply happens in terraform-deploy.yml after merge.

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write          # required for OIDC → AWS STS
  contents: read
  pull-requests: write
  security-events: write

# One run per PR; cancel in-progress on new push for fast feedback.
concurrency:
  group: tf-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.8.0"
  AWS_REGION: "us-east-1"

jobs:

  # ─── 1. Validate — fmt + syntax for every stack ──────────────────────────
  validate:
    name: Validate (${{ matrix.stack }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack: [cluster, dev, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: AWS auth (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: fmt check
        run: terraform fmt -check -recursive
        working-directory: stacks/${{ matrix.stack }}

      - name: init (no backend — syntax check only)
        run: terraform init -backend=false
        working-directory: stacks/${{ matrix.stack }}

      - name: validate
        run: terraform validate
        working-directory: stacks/${{ matrix.stack }}

  # ─── 2. IaC security scan (Trivy) ────────────────────────────────────────
  scan:
    name: IaC scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — upload findings to Security tab
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-iac.sarif
          severity: HIGH,CRITICAL

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-iac.sarif

      - name: Trivy — gate (fails PR on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

  # ─── 3. Plan — shows the diff to the reviewer as a PR comment ────────────
  plan:
    name: Plan (${{ matrix.stack }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        stack: [cluster, dev, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: AWS auth (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: terraform init
        working-directory: stacks/${{ matrix.stack }}

      - name: terraform plan
        id: plan
        run: |
          set -o pipefail
          terraform plan -no-color 2>&1 | tee plan.txt
        working-directory: stacks/${{ matrix.stack }}

      - name: Post plan as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = '';
            try { plan = fs.readFileSync('stacks/${{ matrix.stack }}/plan.txt', 'utf8'); }
            catch { plan = 'Plan output unavailable.'; }
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n...(truncated)' : plan;
            const icon = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${icon} Terraform Plan — \`${{ matrix.stack }}\`\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

  # ─── 4. PR gate — single status check for branch protection ──────────────
  iac-checks:
    name: iac-checks
    if: always()
    needs: [validate, scan, plan]
    runs-on: ubuntu-latest
    steps:
      - name: Gate
        run: |
          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            echo "One or more IaC checks failed."; exit 1
          fi
          echo "All IaC checks passed."
