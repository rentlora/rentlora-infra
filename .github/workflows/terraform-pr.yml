name: Terraform PR

# ── How AWS auth works ────────────────────────────────────────────────────────
# GitHub Actions uses OIDC (no static credentials stored anywhere):
#   1. Each job requests a short-lived OIDC token from GitHub.
#   2. aws-actions/configure-aws-credentials exchanges it with AWS STS for
#      temporary credentials, assuming the role in AWS_CI_ROLE_ARN.
#   3. The IAM role trust policy allows token.actions.githubusercontent.com
#      with sub: repo:rentlora/*:* — scoped to this org only.
#   Permissions required in the job: id-token: write
# ─────────────────────────────────────────────────────────────────────────────
#
# This workflow runs ONLY on pull requests. It validates, scans, and plans every
# stack so the reviewer sees the full diff before merge. It never touches AWS state
# (plan is read-only). Apply happens in terraform-deploy.yml after merge.

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write          # required for OIDC → AWS STS
  contents: read
  pull-requests: write
  security-events: write

# One run per PR; cancel in-progress on new push for fast feedback.
concurrency:
  group: tf-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.8.0"
  AWS_REGION: "us-east-1"

jobs:

  # ─── 1. Validate — fmt + syntax for every stack ──────────────────────────
  validate:
    name: Validate (${{ matrix.stack }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack: [cluster, dev, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/tf-setup
        with:
          stack: ${{ matrix.stack }}
          aws-role-arn: ${{ secrets.AWS_CI_ROLE_ARN }}

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3

      - name: tflint
        run: tflint --init && tflint -f compact
        working-directory: stacks/${{ matrix.stack }}

      - name: fmt check
        run: terraform fmt -check -recursive
        working-directory: stacks/${{ matrix.stack }}

      - name: validate
        run: terraform validate
        working-directory: stacks/${{ matrix.stack }}

  # ─── 2. IaC security scan (Trivy) ────────────────────────────────────────
  scan:
    name: IaC scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — upload findings to Security tab
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-iac.sarif
          severity: HIGH,CRITICAL

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-iac.sarif

      - name: Trivy — gate (fails PR on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

  # ─── 3. Plan — shows the diff to the reviewer as a PR comment ────────────
  plan:
    name: Plan (${{ matrix.stack }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        stack: [cluster, dev, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/tf-setup
        with:
          stack: ${{ matrix.stack }}
          aws-role-arn: ${{ secrets.AWS_CI_ROLE_ARN }}

      - name: terraform plan
        id: plan
        run: |
          set -o pipefail
          terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt
          terraform show -json tfplan > plan.json
        working-directory: stacks/${{ matrix.stack }}

      - name: Create comment body
        if: always()
        run: |
          ICON="${{ steps.plan.outcome == 'success' && '✅' || '❌' }}"
          echo "## ${ICON} Terraform Plan — \`${{ matrix.stack }}\`" > comment.md
          echo "<details><summary>Show Plan</summary>" >> comment.md
          echo "" >> comment.md
          echo '```hcl' >> comment.md
          tail -c 60000 stacks/${{ matrix.stack }}/plan.txt >> comment.md
          echo '```' >> comment.md
          echo "</details>" >> comment.md

      - name: Post plan as PR comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: plan-${{ matrix.stack }}
          path: comment.md

      # Cost estimate — informational only (continue-on-error so a cost-tooling
      # hiccup never blocks an infra merge). Only runs when the plan succeeded.
      - name: Setup Infracost
        if: steps.plan.outcome == 'success'
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      # `infracost comment` needs an Infracost-generated JSON, not a raw
      # `terraform show -json`. Generate it from the plan json first.
      - name: Infracost breakdown
        if: steps.plan.outcome == 'success'
        continue-on-error: true
        run: |
          infracost breakdown \
            --path stacks/${{ matrix.stack }}/plan.json \
            --format json \
            --out-file infracost.json

      - name: Post Infracost PR comment
        if: steps.plan.outcome == 'success'
        continue-on-error: true
        run: |
          infracost comment github \
            --path infracost.json \
            --repo "$GITHUB_REPOSITORY" \
            --github-token ${{ secrets.GITHUB_TOKEN }} \
            --pull-request ${{ github.event.pull_request.number }} \
            --behavior update \
            --tag infracost-${{ matrix.stack }}

  # ─── 4. PR gate — single status check for branch protection ──────────────
  iac-checks:
    name: iac-checks
    if: always()
    needs: [validate, scan, plan]
    runs-on: ubuntu-latest
    steps:
      - name: Gate
        run: |
          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            echo "One or more IaC checks failed."; exit 1
          fi
          echo "All IaC checks passed."
