name: Terraform

# ── How AWS auth works ────────────────────────────────────────────────────────
# GitHub Actions uses OIDC (no static credentials stored anywhere):
#   1. Each job requests a short-lived OIDC token from GitHub.
#   2. aws-actions/configure-aws-credentials exchanges it with AWS STS for
#      temporary credentials, assuming the role in AWS_CI_ROLE_ARN.
#   3. The IAM role trust policy allows token.actions.githubusercontent.com
#      with sub: repo:rentlora/*:* — scoped to this org only.
#   Permissions required in the job: id-token: write
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      stack:
        description: "Stack to plan and apply"
        required: true
        type: choice
        options: [cluster, dev, prod]
  schedule:
    - cron: "0 3 * * *"   # nightly drift detection at 3 AM UTC

permissions:
  id-token: write          # required for OIDC → AWS STS
  contents: read
  pull-requests: write
  security-events: write

# ── Concurrency ───────────────────────────────────────────────────────────────
# PRs:      one run per PR, cancel in progress on new push (fast feedback)
# Applies:  one run per stack, never cancel (queue — don't stomp state)
# Drift:    one run for all drift jobs (schedule)
concurrency:
  group: >-
    ${{
      github.event_name == 'pull_request' && format('tf-pr-{0}', github.event.pull_request.number) ||
      github.event_name == 'schedule'     && 'tf-drift' ||
      format('tf-apply-{0}', inputs.stack || 'dev')
    }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TF_VERSION: "1.8.0"
  AWS_REGION: "us-east-1"

jobs:

  # ─── 1. Validate — runs on every PR, push, and dispatch ──────────────────
  validate:
    name: Validate (${{ matrix.stack }})
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        stack: [cluster, dev, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: AWS auth (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: fmt check
        run: terraform fmt -check -recursive
        working-directory: stacks/${{ matrix.stack }}

      - name: init (no backend — syntax check only)
        run: terraform init -backend=false
        working-directory: stacks/${{ matrix.stack }}

      - name: validate
        run: terraform validate
        working-directory: stacks/${{ matrix.stack }}

  # ─── 2. IaC security scan — PR only ──────────────────────────────────────
  scan:
    name: IaC scan (Trivy)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — upload findings to Security tab
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-iac.sarif
          severity: HIGH,CRITICAL

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-iac.sarif

      - name: Trivy — gate (fails PR on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

  # ─── 3. Plan — PR only (shows diff to reviewer before merge) ─────────────
  plan:
    name: Plan (${{ matrix.stack }})
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        stack: [cluster, dev, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: AWS auth (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: terraform init
        working-directory: stacks/${{ matrix.stack }}

      - name: terraform plan
        id: plan
        run: terraform plan -no-color 2>&1 | tee plan.txt
        working-directory: stacks/${{ matrix.stack }}

      - name: Post plan as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = '';
            try { plan = fs.readFileSync('stacks/${{ matrix.stack }}/plan.txt', 'utf8'); }
            catch { plan = 'Plan output unavailable.'; }
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n...(truncated)' : plan;
            const icon = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${icon} Terraform Plan — \`${{ matrix.stack }}\`\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

  # ─── 4. PR gate — single status check for branch protection ──────────────
  iac-checks:
    name: iac-checks
    if: always() && github.event_name == 'pull_request'
    needs: [validate, scan, plan]
    runs-on: ubuntu-latest
    steps:
      - name: Gate
        run: |
          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            echo "One or more IaC checks failed."; exit 1
          fi
          echo "All IaC checks passed."

  # ─────────────────────────────────────────────────────────────────────────
  # APPLY PIPELINE
  #
  # Pattern for every stack:
  #   plan-<stack>  →  apply-<stack> [environment gate]
  #
  # The plan step saves a binary tfplan artifact (retention: 1 day).
  # The apply step downloads and executes that exact plan — no re-plan.
  # The environment gate fires between the two: the reviewer reads the
  # plan output in the plan job's summary, then approves.
  #
  # Cluster: workflow_dispatch ONLY
  # Dev:     auto on push to main + workflow_dispatch
  # Prod:    workflow_dispatch ONLY — never triggered by a code push
  # ─────────────────────────────────────────────────────────────────────────

  # ─── 5a. CLUSTER — plan ──────────────────────────────────────────────────
  # workflow_dispatch ONLY. Cluster is shared infra (VPC, EKS control plane);
  # a mistake here breaks both dev and prod.
  plan-cluster:
    name: Plan cluster
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.stack == 'cluster'
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: AWS auth (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: terraform init
        working-directory: stacks/cluster

      - name: terraform plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt
        working-directory: stacks/cluster

      - name: Write plan to job summary
        if: always()
        run: |
          echo '### Terraform Plan — cluster' >> "$GITHUB_STEP_SUMMARY"
          echo '```hcl' >> "$GITHUB_STEP_SUMMARY"
          tail -c 60000 stacks/cluster/plan.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-cluster-${{ github.run_id }}
          path: stacks/cluster/tfplan
          retention-days: 1

  # ─── 5b. CLUSTER — apply (environment gate fires here) ───────────────────
  apply-cluster:
    name: Apply cluster
    runs-on: ubuntu-latest
    needs: plan-cluster
    environment: cluster
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: AWS auth (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: terraform init
        working-directory: stacks/cluster

      - name: Download reviewed plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-cluster-${{ github.run_id }}
          path: stacks/cluster

      - name: terraform apply (exact reviewed plan)
        run: terraform apply tfplan
        working-directory: stacks/cluster

      - name: Notify success
        if: success()
        uses: ./.github/actions/notify
        with:
          status: success
          title: "cluster apply succeeded"
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          details: "triggered by ${{ github.actor }}"

      - name: Notify failure
        if: failure()
        uses: ./.github/actions/notify
        with:
          status: failure
          title: "cluster apply FAILED"
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          details: "triggered by ${{ github.actor }}"

  # ─── 6a. DEV — plan ──────────────────────────────────────────────────────
  # Auto on push to main OR workflow_dispatch(dev).
  plan-dev:
    name: Plan dev
    runs-on: ubuntu-latest
    needs: validate
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.stack == 'dev')
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: AWS auth (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: terraform init
        working-directory: stacks/dev

      - name: terraform plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt
        working-directory: stacks/dev

      - name: Write plan to job summary
        if: always()
        run: |
          echo '### Terraform Plan — dev' >> "$GITHUB_STEP_SUMMARY"
          echo '```hcl' >> "$GITHUB_STEP_SUMMARY"
          tail -c 60000 stacks/dev/plan.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev-${{ github.run_id }}
          path: stacks/dev/tfplan
          retention-days: 1

  # ─── 6b. DEV — apply (environment gate fires here) ───────────────────────
  apply-dev:
    name: Apply dev
    runs-on: ubuntu-latest
    needs: plan-dev
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: AWS auth (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: terraform init
        working-directory: stacks/dev

      - name: Download reviewed plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev-${{ github.run_id }}
          path: stacks/dev

      - name: terraform apply (exact reviewed plan)
        run: terraform apply tfplan
        working-directory: stacks/dev

      - name: Notify success
        if: success()
        uses: ./.github/actions/notify
        with:
          status: success
          title: "dev apply succeeded"
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          details: "commit ${{ github.sha }}"

      - name: Notify failure
        if: failure()
        uses: ./.github/actions/notify
        with:
          status: failure
          title: "dev apply FAILED"
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          details: "commit ${{ github.sha }}"

  # ─── 7a. PROD — plan (workflow_dispatch ONLY — never auto) ───────────────
  plan-prod:
    name: Plan prod
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.stack == 'prod'
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: AWS auth (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: terraform init
        working-directory: stacks/prod

      - name: terraform plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt
        working-directory: stacks/prod

      - name: Write plan to job summary
        if: always()
        run: |
          echo '### Terraform Plan — prod' >> "$GITHUB_STEP_SUMMARY"
          echo '```hcl' >> "$GITHUB_STEP_SUMMARY"
          tail -c 60000 stacks/prod/plan.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod-${{ github.run_id }}
          path: stacks/prod/tfplan
          retention-days: 1

  # ─── 7b. PROD — apply (environment gate + required reviewers) ────────────
  apply-prod:
    name: Apply prod
    runs-on: ubuntu-latest
    needs: plan-prod
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: AWS auth (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: terraform init
        working-directory: stacks/prod

      - name: Download reviewed plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod-${{ github.run_id }}
          path: stacks/prod

      - name: terraform apply (exact reviewed plan)
        run: terraform apply tfplan
        working-directory: stacks/prod

      - name: Notify success
        if: success()
        uses: ./.github/actions/notify
        with:
          status: success
          title: "prod apply succeeded"
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          details: "triggered by ${{ github.actor }}"

      - name: Notify failure
        if: failure()
        uses: ./.github/actions/notify
        with:
          status: failure
          title: "prod apply FAILED"
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          details: "triggered by ${{ github.actor }}"

  # ─── 8. Drift detection — nightly scheduled ──────────────────────────────
  # terraform plan -detailed-exitcode: 0=no change, 1=error, 2=drift detected
  drift:
    name: Drift detect (${{ matrix.stack }})
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        stack: [cluster, dev, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: AWS auth (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: terraform init
        working-directory: stacks/${{ matrix.stack }}

      - name: terraform plan (drift check)
        id: drift
        run: |
          set +e
          terraform plan -detailed-exitcode -no-color 2>&1 | tee plan.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        working-directory: stacks/${{ matrix.stack }}

      - name: Write to job summary
        if: always()
        run: |
          CODE="${{ steps.drift.outputs.exit_code }}"
          echo "### Drift check — ${{ matrix.stack }}" >> "$GITHUB_STEP_SUMMARY"
          if   [ "$CODE" = "0" ]; then echo "✅ No drift" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$CODE" = "2" ]; then echo "⚠️ DRIFT DETECTED — run workflow_dispatch to re-apply" >> "$GITHUB_STEP_SUMMARY"
          else                         echo "❌ Plan error" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```hcl' >> "$GITHUB_STEP_SUMMARY"
          tail -c 60000 stacks/${{ matrix.stack }}/plan.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Notify drift or error
        if: steps.drift.outputs.exit_code != '0'
        uses: ./.github/actions/notify
        with:
          status: failure
          title: "drift detected — ${{ matrix.stack }}"
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          details: >-
            ${{ steps.drift.outputs.exit_code == '2' &&
              'manual apply needed — run workflow_dispatch' ||
              'plan error — check job logs' }}

      - name: Fail on drift or plan error
        if: steps.drift.outputs.exit_code != '0'
        run: |
          echo "Drift or plan error in ${{ matrix.stack }} stack (exit_code=${{ steps.drift.outputs.exit_code }})"
          exit 1
