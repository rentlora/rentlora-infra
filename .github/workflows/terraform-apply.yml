name: Terraform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write        # OIDC token for AWS
  contents: read
  pull-requests: write
  security-events: write # upload Trivy SARIF to the Security tab

env:
  TF_VERSION: "1.8.0"
  AWS_REGION: "us-east-1"

jobs:
  # ─── Validate all stacks on every PR/push ──────────────────────────────────
  validate:
    name: Validate (${{ matrix.stack }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        stack: [cluster, dev, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: stacks/${{ matrix.stack }}

      - name: terraform init
        run: terraform init -backend=false
        working-directory: stacks/${{ matrix.stack }}

      - name: terraform validate
        run: terraform validate
        working-directory: stacks/${{ matrix.stack }}

  # ─── IaC security scan (Trivy config) ──────────────────────────────────────
  scan:
    name: IaC scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Report all findings to the Security tab (does not fail the job).
      - name: Trivy config scan — SARIF
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-iac.sarif
          severity: HIGH,CRITICAL

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-iac.sarif

      # Gate: fail the PR check on HIGH/CRITICAL misconfigurations.
      - name: Trivy config scan — gate
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

  # ─── Plan on PRs — posts summary as comment ────────────────────────────────
  plan:
    name: Plan (${{ matrix.stack }})
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: validate
    strategy:
      matrix:
        stack: [cluster, dev, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: terraform init
        working-directory: stacks/${{ matrix.stack }}

      - name: terraform plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt
        working-directory: stacks/${{ matrix.stack }}
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('stacks/${{ matrix.stack }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`${{ matrix.stack }}\`\n\`\`\`\n${truncated}\n\`\`\``
            });

  # ─── Apply cluster stack (shared infra) ────────────────────────────────────
  apply-cluster:
    name: Apply cluster stack
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    environment: cluster   # requires manual approval in GitHub Environments
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: terraform init
        working-directory: stacks/cluster

      - name: terraform apply
        run: terraform apply -auto-approve
        working-directory: stacks/cluster

  # ─── Apply dev stack ───────────────────────────────────────────────────────
  apply-dev:
    name: Apply dev stack
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: apply-cluster
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: terraform init
        working-directory: stacks/dev

      - name: terraform apply
        run: terraform apply -auto-approve
        working-directory: stacks/dev

  # ─── Apply prod stack (gated — requires reviewer approval) ─────────────────
  apply-prod:
    name: Apply prod stack
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: apply-dev
    environment: production   # configure required reviewers in GitHub Environments
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: terraform init
        working-directory: stacks/prod

      - name: terraform apply
        run: terraform apply -auto-approve
        working-directory: stacks/prod

  # ─── PR gate — single context for branch protection ────────────────────────
  iac-checks:
    name: iac-checks
    if: always() && github.event_name == 'pull_request'
    needs: [validate, scan, plan]
    runs-on: ubuntu-latest
    steps:
      - name: Gate on upstream results
        run: |
          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            echo "One or more IaC checks did not pass."; exit 1
          fi
          echo "All IaC checks passed."
